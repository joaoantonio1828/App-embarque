<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cyano • Lançamento rápido</title>
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lançar" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --cyan:#06b6d4;
      --blue:#2563eb;
      --violet:#7c3aed;
      --pink:#ec4899;
      --glass:rgba(255,255,255,.095);
      --glass-strong:rgba(255,255,255,.15);
      --border:rgba(255,255,255,.18);
      --text:#f8fafc;
      --muted:rgba(226,232,240,.74);
      --danger:#fb7185;
      --success:#34d399;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;overflow-x:hidden}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(6,182,212,.55) 0, transparent 34%),
        radial-gradient(circle at 88% 28%, rgba(124,58,237,.50) 0, transparent 36%),
        radial-gradient(circle at 35% 92%, rgba(236,72,153,.26) 0, transparent 36%),
        linear-gradient(180deg,#020617 0%,#08111f 52%,#020617 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:calc(18px + env(safe-area-inset-top)) 18px calc(20px + env(safe-area-inset-bottom));
    }
    body::before{
      content:"";
      position:fixed;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.10),transparent 28%,rgba(255,255,255,.04));
      pointer-events:none;
    }
    .shell{width:100%;max-width:440px;position:relative;z-index:1}
    .top{
      display:flex;align-items:center;gap:12px;margin-bottom:18px;
      animation:slideDown .55s ease both;
    }
    .logo{
      width:58px;height:58px;border-radius:20px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,rgba(6,182,212,.95),rgba(124,58,237,.95));
      box-shadow:0 20px 60px rgba(6,182,212,.28), inset 0 1px 0 rgba(255,255,255,.35);
      font-size:28px;
    }
    .brand h1{font-size:25px;line-height:1;margin:0;font-weight:900;letter-spacing:-.7px}
    .brand p{margin:5px 0 0;color:var(--muted);font-size:14px}
    .card{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      padding:22px;
      background:linear-gradient(145deg,rgba(255,255,255,.17),rgba(255,255,255,.06));
      border:1px solid var(--border);
      backdrop-filter:blur(34px) saturate(180%);
      -webkit-backdrop-filter:blur(34px) saturate(180%);
      box-shadow:0 28px 90px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.22);
      animation:pop .55s cubic-bezier(.2,.9,.2,1.1) both;
    }
    .card::before{
      content:"";position:absolute;inset:0 0 auto 0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
    }
    .amount-wrap{margin-bottom:16px}
    label{display:block;margin:15px 0 8px;color:rgba(248,250,252,.82);font-size:13px;font-weight:800;letter-spacing:.2px}
    input,select{
      width:100%;border:1px solid rgba(255,255,255,.16);
      background:rgba(2,6,23,.42);color:#fff;
      border-radius:20px;padding:16px 16px;font-size:17px;outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .18s ease,border-color .18s ease,background .18s ease;
    }
    input:focus,select:focus{border-color:rgba(6,182,212,.7);background:rgba(2,6,23,.56);transform:translateY(-1px)}
    #amount{
      font-size:42px;font-weight:900;letter-spacing:-1.6px;text-align:center;
      padding:20px 14px;border-radius:26px;
      background:rgba(255,255,255,.10);
    }
    #amount::placeholder{color:rgba(255,255,255,.42)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .quick-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);
      color:#fff;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:800;
    }
    .actions{display:grid;gap:10px;margin-top:20px}
    button{
      appearance:none;border:0;border-radius:22px;padding:17px 18px;
      font-size:16px;font-weight:950;color:white;cursor:pointer;
      transition:transform .15s ease,filter .2s ease,opacity .2s ease;
    }
    button:active{transform:scale(.985)}
    .save{
      background:linear-gradient(135deg,var(--cyan),var(--blue) 52%,var(--violet));
      box-shadow:0 18px 48px rgba(37,99,235,.36), inset 0 1px 0 rgba(255,255,255,.28);
    }
    .save.loading{opacity:.82;filter:saturate(.85)}
    .secondary{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.13);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
    .msg{
      min-height:26px;margin-top:14px;text-align:center;font-size:14px;font-weight:800;color:var(--success);
    }
    .msg.error{color:var(--danger)}
    .hint{text-align:center;color:rgba(226,232,240,.58);font-size:12px;margin-top:14px;line-height:1.35}
    .success-burst{
      position:fixed;inset:0;display:none;place-items:center;z-index:5;
      background:rgba(2,6,23,.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    }
    .success-burst.show{display:grid;animation:fade .25s ease both}
    .success-icon{
      width:116px;height:116px;border-radius:38px;display:grid;place-items:center;font-size:56px;
      background:linear-gradient(135deg,rgba(52,211,153,.92),rgba(6,182,212,.92));
      box-shadow:0 26px 90px rgba(52,211,153,.34);
      animation:pop .42s cubic-bezier(.2,1.15,.3,1.05) both;
    }
    @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @media(max-width:390px){
      body{padding-left:14px;padding-right:14px;align-items:flex-start}
      .top{margin-top:8px}.card{border-radius:30px;padding:18px}.brand h1{font-size:23px}#amount{font-size:38px}.grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="success-burst" id="success-burst"><div class="success-icon">✓</div></div>
  <main class="shell">
    <div class="top">
      <div class="logo">⚡</div>
      <div class="brand">
        <h1>Cyano Rápido</h1>
        <p>Lance agora, revise depois no app.</p>
      </div>
    </div>

    <section class="card">
      <div class="amount-wrap">
        <label>Valor</label>
        <input id="amount" inputmode="decimal" placeholder="0,00" autocomplete="off" autofocus />
      </div>

      <label>Descrição</label>
      <input id="desc" placeholder="Ex: mercado, almoço, uber" autocomplete="off" />
      <div class="quick-chips">
        <button class="chip" type="button" onclick="fillDesc('Mercado')">Mercado</button>
        <button class="chip" type="button" onclick="fillDesc('Almoço')">Almoço</button>
        <button class="chip" type="button" onclick="fillDesc('Uber')">Uber</button>
        <button class="chip" type="button" onclick="fillDesc('Pix')">Pix</button>
      </div>

      <div class="grid">
        <div>
          <label>Pagamento</label>
          <select id="payment">
            <option value="pix">PIX</option>
            <option value="credit_card">Cartão</option>
            <option value="money">Dinheiro</option>
            <option value="debit_card">Débito</option>
          </select>
        </div>
        <div>
          <label>Tipo</label>
          <select id="type">
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="save" id="save-btn" onclick="saveQuick()">Salvar em Pendências</button>
        <button class="secondary" onclick="location.href='/'">Abrir app completo</button>
      </div>
      <div class="msg" id="msg"></div>
      <div class="hint">Dica: toque no ícone da tela inicial para lançar em poucos segundos.</div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://vckpovszyxcdnxdxlgnp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_znq3_9Z7-WaRgKlSHbi0DA_ZAgFvFyc";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const amountInput = document.getElementById('amount');
    const descInput = document.getElementById('desc');
    const msg = document.getElementById('msg');
    const saveBtn = document.getElementById('save-btn');

    function parseCurrency(str) {
      return parseFloat((str || '').replace(/\./g, '').replace(',', '.')) || 0;
    }

    function setMessage(text, type = 'success') {
      msg.textContent = text;
      msg.className = 'msg' + (type === 'error' ? ' error' : '');
    }

    function fillDesc(text) {
      descInput.value = text;
      if (!amountInput.value) amountInput.focus();
      else descInput.focus();
    }

    amountInput.addEventListener('input', e => {
      let v = e.target.value.replace(/\D/g, '');
      if (!v) { e.target.value = ''; return; }
      v = (parseInt(v, 10) / 100).toFixed(2);
      e.target.value = v.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveQuick();
    });

    setTimeout(() => amountInput.focus(), 350);

    async function saveQuick() {
      const amount = parseCurrency(amountInput.value);
      const description = descInput.value.trim();

      if (!amount || !description) {
        setMessage('Preencha valor e descrição.', 'error');
        if (!amount) amountInput.focus(); else descInput.focus();
        return;
      }

      saveBtn.classList.add('loading');
      saveBtn.textContent = 'Salvando...';
      setMessage('');

      const { data: { session } } = await db.auth.getSession();
      if (!session) {
        setMessage('Faça login no app principal primeiro.', 'error');
        setTimeout(() => location.href = '/', 900);
        saveBtn.classList.remove('loading');
        saveBtn.textContent = 'Salvar em Pendências';
        return;
      }

      const payload = {
        user_id: session.user.id,
        type: document.getElementById('type').value,
        description,
        amount,
        date: new Date().toISOString().split('T')[0],
        status: 'pending',
        payment_method: document.getElementById('payment').value,
        category_id: null,
        credit_card_id: null,
        notes: '[REVISAR] Criado pelo atalho rápido',
        source: 'quick'
      };

      const { error } = await db.from('transactions').insert(payload);
      saveBtn.classList.remove('loading');
      saveBtn.textContent = 'Salvar em Pendências';

      if (error) {
        console.error(error);
        setMessage('Erro ao salvar. Abra o app e tente novamente.', 'error');
        return;
      }

      document.getElementById('success-burst').classList.add('show');
      setTimeout(() => document.getElementById('success-burst').classList.remove('show'), 650);
      setMessage('Salvo em Pendências ✅');
      amountInput.value = '';
      descInput.value = '';
      if (navigator.vibrate) navigator.vibrate(35);
      setTimeout(() => amountInput.focus(), 160);
    }
  </script>
</body>
</html>
